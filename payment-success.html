<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso — Andre-Esencia_deluz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .result-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--color-bg); padding: 20px;}
        .result-card { background: white; padding: 50px 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 500px; width: 100%;}
        .result-icon { font-size: 70px; color: #2ecc71; margin-bottom: 20px;}
        .result-title { font-size: 28px; color: var(--color-text); margin-bottom: 10px; font-weight: 600;}
        .result-text { font-size: 15px; color: var(--color-text-light); line-height: 1.6; margin-bottom: 30px;}
    </style>
</head>
<body>
    <div class="result-page">
        <div class="result-card fade-up">
            <i class="fas fa-check-circle result-icon"></i>
            <h1 class="result-title">¡Compra Exitosa!</h1>
            <p class="result-text">Tu pago ha sido procesado por Mercado Pago y tu pedido está confirmado.<br><br>Acabamos de enviarte un recibo a tu correo electrónico con todos los detalles. Pronto prepararemos tu paquete lleno de luz.</p>
            <a href="index.html" class="btn btn-primary" style="width: 100%;">Volver a la tienda</a>
        </div>
    </div>
</body>
</html>
