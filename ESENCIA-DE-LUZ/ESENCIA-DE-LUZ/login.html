<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Esencia de Luz</title>
    <!-- Google Fonts: Inter & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        :root {
            --primary-bg: #fdfaf7;
            --accent-color: #a67c52; /* Terracotta soft */
            --text-dark: #2d2d2d;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body.login-page {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1602872029708-84d970d33fd0?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .login-card h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            margin-bottom: 30px;
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #666;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(166, 124, 82, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #8e6843;
            transform: translateY(-2px);
        }

        .login-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #666;
        }

        .login-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .social-login {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .btn-social {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #555;
        }

        .btn-social:hover {
            background: #f5f5f5;
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .back-to-home {
            margin-top: 20px;
            display: inline-block;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <img src="assets/images/logo-andre.png" alt="Esencia de Luz Logo" style="height: 200px; margin-bottom: 20px;">
            <h2>Bienvenido</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" style="font-size: 0.8rem; color: #8e6843; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <div class="social-login">
                <p style="font-size: 0.8rem; color: #999;">O inicia sesión con</p>
                <div class="social-buttons">
                    <button class="btn-social"><i class="fab fa-google"></i></button>
                    <button class="btn-social"><i class="fab fa-facebook-f"></i></button>
                </div>
            </div>

            <div class="login-footer">
                ¿No tienes una cuenta? <a href="register.html">Regístrate</a>
            </div>
        </div>
        <center><a href="index.html" class="back-to-home"><i class="fas fa-arrow-left"></i> Volver a la tienda</a></center>
    </div>

    <script src="assets/js/api-client.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            const password = e.target.querySelector('input[type="password"]').value;
            
            const btn = e.target.querySelector('.btn-login');
            const originalText = btn.textContent;
            btn.textContent = 'Iniciando sesión...';
            btn.disabled = true;

            try {
                const response = await apiClient.login(email, password);
                if (response.token) {
                    alert('¡Bienvenido! Sesión iniciada con éxito.');
                    window.location.href = 'index.html';
                } else {
                    alert('Error: ' + (response.error || 'Credenciales inválidas'));
                }
            } catch (err) {
                alert('Error al conectar con el servidor. Asegúrate de que el backend esté ejecutándose.');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
